<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React App</title>
  <!-- Load React and ReactDOM libraries (using CDN for this example) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Your App component would need to be defined or imported here -->
  <script type="text/babel">
    // This would be your App component definition
    function App() {
      return (
        <div>
          <h1>Hello from React!</h1>
          {/* Your app content would go here */}
        </div>
      );
    }

    // This is the equivalent of your index.js code
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
